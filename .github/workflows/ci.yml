name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx   # httpx backs the FastAPI TestClient

      - name: Byte-compile sources
        run: python -m compileall -q api.py harness

      - name: Run tests
        run: pytest -q
