services:
  - type: web
    name: fincodebench
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    plan: starter          # upgrade to standard for longer eval runs
    autoDeploy: true

    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false         # optional — dashboard runs are bring-your-own-key; only the harness CLI uses this

      # Dashboard runs are bring-your-own-key for any provider (Anthropic, OpenAI,
      # OpenRouter, DeepSeek, Qwen, Kimi, Venice) — the key is supplied per request.
      # The vars below only affect the harness CLI / module defaults; set the
      # matching key env var (e.g. OPENAI_API_KEY, OPENROUTER_API_KEY,
      # DEEPSEEK_API_KEY, DASHSCOPE_API_KEY, MOONSHOT_API_KEY, VENICE_API_KEY) too.
      - key: FINCODEBENCH_PROVIDER
        sync: false         # optional — CLI default provider (default: anthropic)

      - key: FINCODEBENCH_API_KEY
        sync: false         # optional — gates the destructive DELETE/tasks only; /runs is bring-your-own-key

      # Durable run history. Two options:
      #   • Persistent disk (paid plans): keep DATA_DIR + the disk block below.
      #   • Free tier (no disks): leave the disk off and set DATABASE_URL to any
      #     Postgres connection string (Neon/Supabase free tiers are durable;
      #     Render's own free Postgres works too but expires). Runs then persist
      #     in the DB and survive restarts/spin-downs. Without either, runs are
      #     ephemeral and the browser still keeps your own runs locally.
      - key: DATA_DIR
        value: /data        # persistent disk mount point (paid plans)

      - key: DATABASE_URL
        sync: false         # optional — postgres://… for durable storage on free tier

      - key: FINCODEBENCH_MODEL
        sync: false         # optional — runner model override; defaults to the provider's default model

      - key: FINCODEBENCH_JUDGE_MODEL
        sync: false         # optional — judge model override; defaults to the provider's default judge model

    disk:
      name: fincodebench-data
      mountPath: /data
      sizeGB: 1             # stores results JSON — 1GB is plenty
